<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – VLT NEWS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:  #1a7a3c;
      --green2: #23a455;
      --dark:   #0d0d0d;
      --panel:  #141414;
      --card:   #1a1a1a;
      --border: #2a2a2a;
      --text:   #e8e8e8;
      --muted:  #888;
      --yellow: #f5c842;
      --red:    #e03c3c;
      --amber:  #f0922b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 4px;
      color: var(--green2);
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .login-label {
      text-align: left;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .login-input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 3px;
      transition: border-color .2s;
    }
    .login-input:focus { border-color: var(--green); }

    .login-btn {
      width: 100%;
      background: var(--green);
      border: none;
      color: #fff;
      padding: 13px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background .2s;
      letter-spacing: 1px;
    }
    .login-btn:hover { background: var(--green2); }

    .login-error {
      font-size: 0.8rem;
      color: var(--red);
      margin-top: 10px;
      display: none;
    }

    /* ── ADMIN LAYOUT ── */
    #admin-screen { display: none; }

    header {
      background: var(--panel);
      border-bottom: 2px solid var(--green);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 3px;
      color: var(--green2);
    }

    .header-badge {
      background: var(--green);
      color: #fff;
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .logout-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: var(--green2);
    }

    .card-body { padding: 20px; }

    /* ── STATUS ── */
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .status-opt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all .2s;
      background: var(--panel);
    }
    .status-opt.selected { border-color: var(--green2); background: rgba(26,122,60,.15); }
    .status-opt .sdot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }

    .current-status-bar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    #current-status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    /* ── LINKS ── */
    .link-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .link-icon-label {
      font-size: 1.1rem;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }

    .link-name-input, .link-url-input {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s;
    }
    .link-name-input { width: 130px; flex-shrink: 0; }
    .link-url-input  { flex: 1; }
    .link-name-input:focus, .link-url-input:focus { border-color: var(--green); }

    /* ── COMMENTS ── */
    .comment-form-admin {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .comment-textarea {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
    }
    .comment-textarea:focus { border-color: var(--green); }

    .comment-post-btn {
      background: var(--yellow);
      border: none;
      color: #000;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.82rem;
      flex-shrink: 0;
      transition: opacity .2s;
    }
    .comment-post-btn:hover { opacity: .85; }

    .comments-list { display: flex; flex-direction: column; gap: 8px; }

    .comment-item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .comment-item.is-admin { border-color: var(--yellow); background: rgba(245,200,66,.05); }

    .comment-content { flex: 1; }

    .comment-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
      flex-wrap: wrap;
    }

    .comment-author { font-size: 0.72rem; font-weight: 700; color: var(--green2); }
    .comment-author.admin { color: var(--yellow); }
    .admin-badge { font-size: 0.6rem; background: var(--yellow); color: #000; padding: 1px 5px; border-radius: 4px; font-weight: 700; }
    .comment-time { font-size: 0.65rem; color: var(--muted); }
    .comment-text { font-size: 0.82rem; color: var(--text); line-height: 1.5; }

    .expires-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 8px; overflow: hidden; }
    .expires-fill { height: 100%; background: var(--green); border-radius: 1px; }

    .del-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--red);
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s;
    }
    .del-btn:hover { background: rgba(224,60,60,.15); }

    .empty-msg {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* ── BUTTONS ── */
    .save-btn {
      background: var(--green);
      border: none;
      color: #fff;
      padding: 11px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background .2s;
      letter-spacing: .5px;
    }
    .save-btn:hover { background: var(--green2); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.88rem;
      transition: transform .3s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── STATS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-family: 'Roboto Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--green2);
    }

    .stat-label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .status-grid { grid-template-columns: 1fr; }
      .link-row { flex-wrap: wrap; }
      .link-name-input { width: 100%; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">VLT NEWS</div>
    <div class="login-sub">Painel Administrativo</div>
    <div class="login-label">Senha</div>
    <input class="login-input" type="password" id="login-input" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Senha incorreta.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <header>
    <div class="header-title">VLT NEWS</div>
    <div class="header-badge">Admin</div>
    <button class="logout-btn" onclick="doLogout()">Sair</button>
  </header>

  <main>

    <!-- STATS -->
    <div class="card">
      <div class="card-header"><span>📊</span><h2>Visão Geral</h2></div>
      <div class="card-body">
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="stat-comments">—</div>
            <div class="stat-label">Avisos ativos</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-status-val">—</div>
            <div class="stat-label">Status atual</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-time">—</div>
            <div class="stat-label">Hora local</div>
          </div>
        </div>
      </div>
    </div>

    <!-- STATUS -->
    <div class="card">
      <div class="card-header"><span>🟢</span><h2>Status do VLT</h2></div>
      <div class="card-body">
        <div class="current-status-bar">
          <div id="current-status-dot"></div>
          <span id="current-status-text">Carregando...</span>
        </div>
        <div class="status-grid">
          <div class="status-opt selected" data-color="green" onclick="selectStatus(this)">
            <div class="sdot" style="background:#1a7a3c"></div> No horário
          </div>
          <div class="status-opt" data-color="yellow" onclick="selectStatus(this)">
            <div class="sdot" style="background:#f5c842"></div> Leve atraso
          </div>
          <div class="status-opt" data-color="red" onclick="selectStatus(this)">
            <div class="sdot" style="background:#e03c3c"></div> Muito atrasado
          </div>
          <div class="status-opt" data-color="black" onclick="selectStatus(this)">
            <div class="sdot" style="background:#555"></div> Fora de operação
          </div>
        </div>
        <button class="save-btn" onclick="saveStatus()">Salvar Status</button>
      </div>
    </div>

    <!-- LINKS -->
    <div class="card">
      <div class="card-header"><span>🔗</span><h2>Links</h2></div>
      <div class="card-body">
        <div id="links-editor">
          <!-- injected by JS -->
        </div>
        <button class="save-btn" onclick="saveLinks()">Salvar Links</button>
      </div>
    </div>

    <!-- MURAL ADMIN -->
    <div class="card">
      <div class="card-header"><span>📢</span><h2>Mural de Avisos</h2></div>
      <div class="card-body">
        <div class="comment-form-admin">
          <textarea class="comment-textarea" id="admin-comment" rows="2" placeholder="Postar aviso como ADMIN (destacado em amarelo)..."></textarea>
          <button class="comment-post-btn" onclick="postAdminComment()">★ Postar</button>
        </div>
        <div class="comments-list" id="admin-comments-list">
          <div class="empty-msg">Carregando avisos...</div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://fvuzlemkhpfoxjkjcnih.supabase.co';
const SUPABASE_KEY = 'sb_publishable_hv_CGrOu6sRCyAveyzN6TA_ckEZRuCm';
const ADMIN_PASSWORD = 'batata';
const COMMENT_LIFETIME_HOURS = 6;

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

const STATUS_MAP = {
  green:  { color: '#1a7a3c', label: 'No horário' },
  yellow: { color: '#f5c842', label: 'Leve atraso' },
  red:    { color: '#e03c3c', label: 'Muito atrasado' },
  black:  { color: '#555',    label: 'Fora de operação' }
};

let selectedStatus = 'green';
let linksData = [];

// ── LOGIN ──
function doLogin() {
  const val = document.getElementById('login-input').value;
  if (val === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    initAdmin();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-input').value = '';
  }
}

function doLogout() {
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-input').value = '';
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  document.getElementById('stat-time').textContent =
    now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

// ── STATUS ──
async function loadStatus() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/status?id=eq.1`, { headers });
  const d = await r.json();
  if (d && d[0]) applyStatus(d[0].color);
}

function applyStatus(color) {
  const s = STATUS_MAP[color] || STATUS_MAP.green;
  selectedStatus = color;
  document.getElementById('current-status-dot').style.cssText = `width:12px;height:12px;border-radius:50%;background:${s.color}`;
  document.getElementById('current-status-text').textContent = `Status atual: ${s.label}`;
  document.getElementById('stat-status-val').textContent = ['🟢','🟡','🔴','⚫'][['green','yellow','red','black'].indexOf(color)] || '🟢';
  document.querySelectorAll('.status-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.color === color);
  });
}

function selectStatus(el) {
  document.querySelectorAll('.status-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedStatus = el.dataset.color;
}

async function saveStatus() {
  await fetch(`${SUPABASE_URL}/rest/v1/status?id=eq.1`, {
    method: 'PATCH',
    headers,
    body: JSON.stringify({ color: selectedStatus, updated_at: new Date().toISOString() })
  });
  applyStatus(selectedStatus);
  showToast('✅ Status atualizado!');
}

// ── LINKS ──
async function loadLinks() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/links?order=id`, { headers });
  linksData = await r.json();
  renderLinksEditor();
}

function renderLinksEditor() {
  const icons = ['💬','💬','💬','📸'];
  const editor = document.getElementById('links-editor');
  editor.innerHTML = linksData.map((link, i) => `
    <div class="link-row">
      <div class="link-icon-label">${icons[i] || '🔗'}</div>
      <input class="link-name-input" id="link-name-${link.id}" value="${escapeAttr(link.name)}" placeholder="Nome" />
      <input class="link-url-input"  id="link-url-${link.id}"  value="${escapeAttr(link.url)}"  placeholder="https://..." />
    </div>
  `).join('');
}

async function saveLinks() {
  for (const link of linksData) {
    const name = document.getElementById(`link-name-${link.id}`).value.trim();
    const url  = document.getElementById(`link-url-${link.id}`).value.trim();
    await fetch(`${SUPABASE_URL}/rest/v1/links?id=eq.${link.id}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify({ name, url })
    });
  }
  showToast('✅ Links salvos!');
  await loadLinks();
}

// ── COMMENTS ──
function timeAgo(iso) {
  const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (diff < 1)  return 'agora mesmo';
  if (diff < 60) return `${diff} min atrás`;
  return `${Math.floor(diff/60)}h atrás`;
}

async function loadComments() {
  const cutoff = new Date(Date.now() - COMMENT_LIFETIME_HOURS * 3600000).toISOString();
  await fetch(`${SUPABASE_URL}/rest/v1/comments?created_at=lt.${cutoff}`, {
    method: 'DELETE', headers
  });
  const r = await fetch(`${SUPABASE_URL}/rest/v1/comments?order=created_at.desc&limit=30`, { headers });
  const data = await r.json();
  renderComments(data);
  document.getElementById('stat-comments').textContent = data ? data.length : 0;
}

function renderComments(comments) {
  const list = document.getElementById('admin-comments-list');
  if (!comments || comments.length === 0) {
    list.innerHTML = '<div class="empty-msg">Nenhum aviso no mural.</div>';
    return;
  }
  const lifetimeMs = COMMENT_LIFETIME_HOURS * 3600000;
  list.innerHTML = comments.map(c => {
    const age = Date.now() - new Date(c.created_at).getTime();
    const pct = Math.max(0, Math.min(100, 100 - (age / lifetimeMs) * 100));
    return `
      <div class="comment-item ${c.is_admin ? 'is-admin' : ''}">
        <div style="flex:1">
          <div class="comment-meta">
            <span class="comment-author ${c.is_admin ? 'admin' : ''}">${c.is_admin ? 'Admin' : 'Usuário'}</span>
            ${c.is_admin ? '<span class="admin-badge">ADMIN</span>' : ''}
            <span class="comment-time">${timeAgo(c.created_at)}</span>
          </div>
          <div class="comment-text">${escapeHtml(c.text)}</div>
          <div class="expires-bar"><div class="expires-fill" style="width:${pct}%"></div></div>
        </div>
        <button class="del-btn" onclick="deleteComment('${c.id}')" title="Excluir">✕</button>
      </div>
    `;
  }).join('');
}

async function postAdminComment() {
  const input = document.getElementById('admin-comment');
  const text = input.value.trim();
  if (!text) return;
  input.disabled = true;
  await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
    method: 'POST',
    headers,
    body: JSON.stringify({ text, is_admin: true })
  });
  input.value = '';
  input.disabled = false;
  await loadComments();
  showToast('✅ Aviso postado!');
}

async function deleteComment(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/comments?id=eq.${id}`, {
    method: 'DELETE', headers
  });
  await loadComments();
  showToast('🗑️ Aviso removido.');
}

// ── HELPERS ──
function escapeHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(t) {
  return String(t).replace(/"/g,'&quot;');
}

// ── INIT ──
async function initAdmin() {
  await Promise.all([loadStatus(), loadLinks(), loadComments()]);
  updateClock();
  setInterval(updateClock, 30000);
  setInterval(loadComments, 60000);
}
</script>
</body>
</html>
